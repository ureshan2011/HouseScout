name: Deploy to GitHub Pages

# Builds the static Next.js export in frontend/ and publishes it to GitHub Pages.
# Set Pages source to "GitHub Actions" in repo Settings → Pages.

on:
  push:
    branches:
      - main
      - claude/github-pages-web-app-d8to5j
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Force the Pages "Source" to GitHub Actions (build_type=workflow). This is
      # idempotent and switches a repo that's still set to "Deploy from a branch"
      # (which would otherwise serve the Jekyll-rendered README) over to this build.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        # A project Pages site is served from /<repo>, so basePath must match.
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Ensure .nojekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    # The github-pages environment only allows deployments from the default branch,
    # so only attempt to deploy on main. Pushes to other branches just build (CI).
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
