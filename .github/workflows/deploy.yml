name: Deploy to GitHub Pages

# Multi-runner scraping strategy:
#   1. API scrapers (fast, no browser) — always succeed as baseline
#   2. Playwright scrapers (richer data) — one per source, different browser/IP
#   3. Merge all results, dedupe, build static site, deploy
#
# This ensures the site always has content (API scrapers are reliable fallback)
# while the Playwright scrapers add richer data when they can get through.

on:
  push:
    branches:
      - main
      - claude/github-pages-web-app-d8to5j
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---- Runner 0: API-based scrapers (fast, no Playwright needed) ---- #
  scrape-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Run API scrapers + seed data
        run: python scripts/build_listings.py

      - name: Expand with additional sources
        run: python scripts/expand_listings.py

      - name: Upload API results
        uses: actions/upload-artifact@v4
        with:
          name: partial-api
          if-no-files-found: ignore
          path: |
            frontend/public/listings.json
            frontend/public/partials/
            frontend/public/photos/

  # ---- Runners 1-3: Playwright scrapers (richer data, may get blocked) ---- #
  scrape-browser:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: realestate.co.nz
            browser: chromium
            slug: realestate
          - source: trademe.co.nz
            browser: firefox
            slug: trademe
          - source: oneroof.co.nz
            browser: chromium
            slug: oneroof
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + ${{ matrix.browser }}
        run: |
          python -m pip install --upgrade pip
          pip install playwright pillow
          python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Scrape ${{ matrix.source }}
        run: python scripts/scrape_listings.py
        env:
          SCRAPE_SOURCE: ${{ matrix.source }}
          SCRAPE_BROWSER: ${{ matrix.browser }}
          SCRAPE_MAX_PAGES: "5"

      - name: Upload partial (${{ matrix.slug }})
        uses: actions/upload-artifact@v4
        with:
          name: partial-${{ matrix.slug }}
          if-no-files-found: ignore
          path: |
            frontend/public/partials/
            frontend/public/photos/

  build:
    needs: [scrape-api, scrape-browser]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all scraped data
        uses: actions/download-artifact@v4
        with:
          path: frontend/public
          merge-multiple: true

      - name: Merge + dedupe all listings
        run: |
          # If Playwright scrapers produced partials, merge them into listings.json
          if [ -d frontend/public/partials ] && [ "$(ls frontend/public/partials/*.json 2>/dev/null)" ]; then
            python scripts/merge_listings.py
          else
            echo "No browser partials found; using API-scraped listings.json"
          fi
          # Ensure we always have a baseline if every scraper produced nothing.
          if [ ! -s frontend/public/listings.json ]; then
            python scripts/build_listings.py && python scripts/expand_listings.py
          fi
          echo "Final listing count:"
          python -c "import json; d=json.load(open('frontend/public/listings.json')); print(f'  {len(d)} listings from {len(set(l.get(\"suburb\",\"?\") for l in d))} suburbs')"

      - name: Generate AI analysis for every listing
        run: python scripts/generate_ai_insights.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Ensure .nojekyll
        working-directory: frontend
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
